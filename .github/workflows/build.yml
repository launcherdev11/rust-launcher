name: Build & Release

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Create Github Release?'
        type: boolean
        required: true
        default: false
      prerelease:
        description: 'Is this a beta/pre-release?'
        type: boolean
        required: false
        default: false
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: false
        default: "v2.0.0"

  push:
    branches:
      - main
      - 16account
    tags:
      - "v*.*.*"
      - "v*.*.*-beta*"
      - "v*.*.*-rc*"

  pull_request:
    branches:
      - main
      - 16account

permissions:
  contents: write

jobs:
  check:
    name: CI checks (frontend deps + Rust check/clippy)
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/16account'))
      || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Setup Rust toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Check Rust code compiles
        working-directory: src-tauri
        run: cargo check --locked

      - name: Lint Rust code (clippy)
        working-directory: src-tauri
        run: cargo clippy --locked

  build:
    name: Build Tauri bundles (${{ matrix.label }})
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            wayland-protocols

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          PRERELEASE=false
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            if [[ "${{ github.ref_name }}" == *-beta* || "${{ github.ref_name }}" == *-rc* ]]; then
              PRERELEASE=true
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.make_release }}" == "true" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
              PRERELEASE=true
            fi
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Build Tauri bundles and create Release (with updater artifacts)
        if: github.event_name != 'push' || !contains(github.ref_name, '-beta.') || matrix.os == 'ubuntu-latest'
        id: tauri_build
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELY_CLIENT_SECRET: ${{ secrets.ELY_CLIENT_SECRET }}
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_HOSTS: ${{ secrets.PROXY_HOSTS }}
          PROXY_HOST_FORGE_IPV6: ${{ secrets.PROXY_HOST_FORGE_IPV6 }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
          DISCORD_APPLICATION_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
          DISCORD_RPC_LARGE_IMAGE_KEY: ${{ secrets.DISCORD_RPC_LARGE_IMAGE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        with:
          projectPath: .
          tauriScript: "npm run tauri"
          includeDebug: false
          includeRelease: true
          tagName: ${{ steps.release_tag.outputs.tag }}
          releaseName: 16Launcher ${{ steps.release_tag.outputs.tag }}
          prerelease: ${{ steps.release_tag.outputs.prerelease }}

      - name: Prepare beta updater manifest
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-beta.')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_json="$(mktemp)"
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
            -o "${release_json}"

          asset_url="$(python -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); assets=data.get("assets", []); pref=next((a.get("url","") for a in assets if a.get("name","")=="latest.json"), ""); fb=next((a.get("url","") for a in assets if a.get("name","").startswith("latest") and a.get("name","").endswith(".json")), ""); print(pref or fb)' "${release_json}")"

          if [ -z "${asset_url}" ]; then
            echo "No updater latest*.json asset found in release ${GITHUB_REF_NAME}"
            exit 1
          fi

          mkdir -p src-tauri/target/release/bundle
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "${asset_url}" \
            -o src-tauri/target/release/bundle/beta.json

      - name: Upload beta updater manifest
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-beta.')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/beta.json
          fail_on_unmatched_files: true

      - name: Upload bundles as workflow artifact
        if: github.event_name != 'push' || !contains(github.ref_name, '-beta.') || matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: 16Launcher-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/**

