name: Release Tauri

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & release Tauri app (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            wayland-protocols

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Generate changelog with commit links
        id: generate_changelog
        run: |
          REPO="${{ github.repository }}"
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude="v${{ needs.extract-version.outputs.version }}" HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-decorate)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --oneline --no-decorate)
          fi

          if [ -z "$COMMITS" ]; then
            CHANGELOG="Нет изменений"
          else
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                COMMIT_HASH=$(echo "$line" | cut -d' ' -f1)
                COMMIT_MSG=$(echo "$line" | cut -d' ' -f2-)
                echo "- [$COMMIT_HASH](https://github.com/$REPO/commit/$COMMIT_HASH) $COMMIT_MSG"
              fi
            done <<< "$COMMITS" > /tmp/changelog.md
            CHANGELOG=$(cat /tmp/changelog.md)
          fi

          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and create GitHub release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELY_CLIENT_SECRET: ${{ secrets.ELY_CLIENT_SECRET }}
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_HOSTS: ${{ secrets.PROXY_HOSTS }}
          PROXY_HOST_FORGE_IPV6: ${{ secrets.PROXY_HOST_FORGE_IPV6 }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
          DISCORD_APPLICATION_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
          DISCORD_RPC_LARGE_IMAGE_KEY: ${{ secrets.DISCORD_RPC_LARGE_IMAGE_KEY }}
        with:
          projectPath: .
          tauriScript: "npm run tauri"
          tagName: "v__VERSION__"
          releaseName: "16Launcher v__VERSION__"
          releaseBody: ${{ steps.generate_changelog.outputs.CHANGELOG }}

